<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduHub – Academia Platform</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#f4f3f1;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .wrap{text-align:center;padding:40px 20px}
    h1{font-size:2rem;color:#7B1C2E;margin-bottom:8px}
    p{color:#6b6b6b;margin-bottom:40px}
    .cards{display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
    .card{background:#fff;border:1px solid #e5e2de;border-radius:16px;padding:32px 40px;width:240px;text-decoration:none;color:#1a1a1a;transition:all .2s;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    .card:hover{border-color:#7B1C2E;box-shadow:0 8px 30px rgba(123,28,46,.15);transform:translateY(-4px)}
    .icon{font-size:3rem;margin-bottom:16px}
    .card h2{font-size:1.1rem;font-weight:700;margin-bottom:6px;color:#7B1C2E}
    .card p{font-size:.84rem;color:#6b6b6b;margin:0}
    .badge{display:inline-block;margin-top:14px;padding:5px 14px;background:#7B1C2E;color:#fff;border-radius:999px;font-size:.75rem;font-weight:600}
  </style>
</head>
<body>
<div class="wrap">
  <h1>🎓 EduHub Academia</h1>
  <p>System Analysis and Design Project — Choose your version</p>
  <div class="cards">
    <a class="card" href="EduHub-Dekstop/index.html">
      <div class="icon">🖥️</div>
      <h2>Desktop Version</h2>
      <p>Full PC experience with sidebar navigation and multi-page layout</p>
      <span class="badge">Open Desktop →</span>
    </a>
    <a class="card" href="EduHub-Mobile/index.html">
      <div class="icon">📱</div>
      <h2>Mobile Version</h2>
      <p>Mobile-first design with bottom navigation for phones and tablets</p>
      <span class="badge">Open Mobile →</span>
    </a>
  </div>
</div>
</body>
</html>
